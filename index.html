<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .logo {
            margin-bottom: 30px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
            font-weight: 700;
        }
        p {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }
        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 14px 32px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            position: relative;
            overflow: hidden;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        .btn:active::before {
            width: 300px;
            height: 300px;
        }
        .btn-masuk {
            background-color: #007AFF;
            color: white;
        }
        .btn-masuk:hover {
            background-color: #0062cc;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 122, 255, 0.4);
        }
        .btn-keluar {
            background-color: #f0f0f0;
            color: #333;
            border: 2px solid #ddd;
        }
        .btn-keluar:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }
        .footer {
            margin-top: 25px;
            color: #999;
            font-size: 12px;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
            font-weight: 600;
        }
        .status.success {
            background-color: #d4edda;
            color: #155724;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="60" height="60" rx="10" fill="#007AFF"/>
                <path d="M15 20L25 30L35 20" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M20 25L30 35L40 25" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M25 30L35 40L45 30" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <h1>Login App</h1>
        <p>Silakan pilih tindakan untuk melanjutkan</p>

        <div class="button-container">
            <button class="btn btn-masuk" onclick="handleMasuk()">Masuk</button>
            <button class="btn btn-keluar" onclick="handleKeluar()">Keluar</button>
        </div>

        <div class="status" id="status"></div>

        <div class="footer">
            © 2026 Security System. All rights reserved.
        </div>
    </div>

    <script>
        function generateBeep(frequency = 440, duration = 200, type = 'sine') {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                oscillator.frequency.value = frequency;
                oscillator.type = type;

                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration / 1000);

                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + duration / 1000);
            } catch (e) {
                console.log('Audio error:', e);
            }
        }

        function playSuccessSound() {
            setTimeout(() => generateBeep(523, 150), 0);
            setTimeout(() => generateBeep(659, 150), 200);
            setTimeout(() => generateBeep(784, 300), 400);
        }

        function playErrorSound() {
            setTimeout(() => generateBeep(784, 150), 0);
            setTimeout(() => generateBeep(659, 150), 200);
            setTimeout(() => generateBeep(523, 300), 400);
        }

        function showStatus(message, type) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
            setTimeout(() => {
                statusEl.className = 'status';
            }, 3000);
        }

        function handleMasuk() {
            playSuccessSound();
            showStatus('✓ Masuk berhasil!', 'success');
            console.log('Audio: Masuk dimainkan');
        }

        function handleKeluar() {
            playErrorSound();
            showStatus('✓ Keluar berhasil!', 'success');
            console.log('Audio: Keluar dimainkan');
        }
    </script>
</body>
</html>
